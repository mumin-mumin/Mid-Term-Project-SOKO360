<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SOKO360</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="auth-container-single">
        <div class="auth-box-redesigned">
            <div class="logo animated-logo">prime
                <color style="color: #ff6600;">picks</color>
            </div>
            <h2>Create Account</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i></label>
                    <input type="text" id="username" name="username" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i></label>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i></label>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn auth-btn">Sign Up</button>
            </form>
            <p class="auth-switch">Already have an account? <a href="index.html">Sign In</a></p>
        </div>
    </div>
    <script type="module" src="firebase-auth.js"></script>
</body>

</html>
