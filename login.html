<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | Event Finder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Optional styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            max-width: 400px;
            margin: auto;
        }
        
        input,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        
        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>

    <!-- Firebase SDKs -->
    <script type="module" src="https://www.gstatic.com/firebasejs/10.5.2/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.5.2/firebase-auth.js"></script>
    <script type="module" src="./firebase.js" defer></script>
    <script type="module" src="./login.js" defer></script>
</head>

<body>
    <h2>Login to Event Finder</h2>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>

        <p id="message"></p>
    </form>
</body>

</html>
